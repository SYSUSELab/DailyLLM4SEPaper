<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <!-- 设置内容安全策略 (CSP) 以解决 unsafe-eval 报错 -->
    <meta http-equiv="Content-Security-Policy" content="
        default-src 'self' https://www.googletagmanager.com https://www.google-analytics.com;
        script-src 'self' 'unsafe-inline' 'unsafe-eval' https://www.googletagmanager.com https://www.google-analytics.com;
        style-src 'self' 'unsafe-inline';
        img-src 'self' data: https:;
        connect-src 'self' https://www.google-analytics.com https://analytics.google.com chrome-extension: moz-extension: ms-browser-extension:;
    ">

    <!-- Google tag (gtag.js) -->
    <script async src="https://www.googletagmanager.com/gtag/js?id=G-1VP8RP72FC"></script>
    <script>
      window.dataLayer = window.dataLayer || [];
      function gtag(){dataLayer.push(arguments);}
      gtag('js', new Date());

      gtag('config', 'G-1VP8RP72FC');
    </script>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LLM4SEPaper - LLM4SE 最新论文</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <header>
        <div class="container">
            <h1>📚 LLM4SEPaper</h1>
            <p class="subtitle">每日自动更新 LLM4SE 领域最新论文</p>
            <p class="update-time">最后更新: 2026-02-28 02:10:39 UTC</p>
        </div>
    </header>

    <nav class="container">
        <div class="filter-section">
            <div class="filter-group">
                <label class="filter-label">📅 时间范围：</label>
                <div class="date-range-filter">
                    <input type="date" id="startDate" class="date-input">
                    <span class="date-separator">至</span>
                    <input type="date" id="endDate" class="date-input">
                    <button id="resetDateBtn" class="filter-btn" style="margin-left: 10px; padding: 0.4rem 0.8rem;">重置</button>
                </div>
            </div>
            <div class="filter-group">
                <label class="filter-label">📌 发表状态：</label>
                <div class="filters status-filters">
                    <button class="filter-btn status-btn active" data-status="all">全部 (636)</button>
                    <button class="filter-btn status-btn" data-status="published">已发表 (140)</button>
                    <button class="filter-btn status-btn" data-status="preprint">预印本 (496)</button>
                </div>
            </div>
            <div class="filter-group">
                <label class="filter-label">📑 论文类型：</label>
                <div class="filters category-filters">
                    <button class="filter-btn category-btn active" data-category="all">全部 (636)</button>
                    <button class="filter-btn category-btn" data-category="Survey">Survey (26)</button>
                    <button class="filter-btn category-btn" data-category="Empirical">Empirical (324)</button>
                    <button class="filter-btn category-btn" data-category="Technical">Technical (385)</button>
                    <button class="filter-btn category-btn" data-category="Benchmark">Benchmark (358)</button>
                </div>
            </div>
            <div class="filter-group">
                <label class="filter-label">🏷️ 研究领域：</label>
                <div class="filters field-filters">
                    <button class="filter-btn field-btn active" data-field="all">全部 (636)</button>
                    <button class="filter-btn field-btn" data-field="Requirements & Design">Requirements & Design (31)</button>
                    <button class="filter-btn field-btn" data-field="Coding Assistant">Coding Assistant (340)</button>
                    <button class="filter-btn field-btn" data-field="Software Testing">Software Testing (36)</button>
                    <button class="filter-btn field-btn" data-field="AIOps">AIOps (7)</button>
                    <button class="filter-btn field-btn" data-field="Maintenance">Maintenance (16)</button>
                    <button class="filter-btn field-btn" data-field="Quality Management">Quality Management (83)</button>
                    <button class="filter-btn field-btn" data-field="Version Control & Collaboration">Version Control & Collaboration (7)</button>
                </div>
            </div>
            <div class="filter-group">
                <label class="filter-label">🎯 Task：</label>
                <div class="filters sort-filters">
                    <button class="filter-btn task-btn active" data-task="all">全部 (636)</button>
                </div>
            </div>
            <div class="filter-group">
                <label class="filter-label">🔄 排序方式：</label>
                <div class="filters sort-filters">
                    <button class="filter-btn sort-btn active" data-sort="date-desc">最新优先</button>
                    <button class="filter-btn sort-btn" data-sort="date-asc">最早优先</button>
                </div>
            </div>
        </div>
        <div class="search-box">
            <input type="text" id="searchInput" placeholder="🔍 搜索论文标题、作者、摘要...">
        </div>
        <div class="results-info">
            <span id="resultsCount">加载中...</span>
            <div class="export-controls">
                <button class="select-btn" id="selectAllBtn">✓ 全选</button>
                <button class="select-btn" id="clearAllBtn">✗ 清空</button>
                <button class="export-btn" id="exportBtn">📥 导出选中 (<span id="selectedCount">0</span>)</button>
            </div>
        </div>
    </nav>

    <main class="container">
        <div id="papers-container">
            <!-- Papers will be loaded by JavaScript -->
        </div>
    </main>

    <footer>
        <div class="container">
            <p>© 2025 LLM4SEPaper | 数据来源: ArXiv | <a href="https://github.com/SYSUSELab/DailyLLM4SEPaper" target="_blank">GitHub</a></p>
        </div>
    </footer>

    <script src="js/main.js"></script>
</body>
</html>
